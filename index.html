<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Raffaello</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="top-nav-effect.css" />
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>
    <script type="module" src="app.js" defer></script>
  </head>
  <body class="cat-C">
    <header class="menu-header">
      <div class="menu-strip nav-links" id="navLinks">
        <nav class="navbar topnavfx" id="topNavFx" aria-label="Main top navigation">
          <div class="topnavfx__highlight" id="topNavFxHighlight" aria-hidden="true"></div>
          <ul class="navbar__menu topnavfx__menu">
            <li class="navbar__item topnavfx__item">
              <button class="navbar__link topnavfx__link nav-item menu-chip active" data-page="DB" data-topnavfx-item="music">
                <span class="topnavfx__label">MUSIC</span>
                <span class="count" id="countDB">(0)</span>
              </button>
            </li>
            <li class="navbar__item topnavfx__item">
              <button class="navbar__link topnavfx__link nav-item menu-chip" data-page="FD" data-topnavfx-item="folders">
                <span class="topnavfx__label">FOLDERS</span>
              </button>
            </li>
            <li class="navbar__item topnavfx__item">
              <button id="filterBtn" class="navbar__link topnavfx__link menu-chip filter-btn" data-topnavfx-item="settings">
                <span class="topnavfx__label">
                  SETTINGS
                  <span class="menu-chip__dot"></span>
                </span>
              </button>
            </li>
            <li class="navbar__item topnavfx__item">
              <button id="updateBtn" class="navbar__link topnavfx__link menu-chip action-primary" data-topnavfx-item="save" aria-label="Save">
                <svg class="topnavfx__save-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M5 2h11l3 3v17H5z" fill="currentColor" />
                  <path d="M8 2h8v6H8z" fill="currentColor" opacity="0.35" />
                  <path d="M8 14h8v5H8z" fill="currentColor" opacity="0.35" />
                </svg>
              </button>
            </li>
          </ul>
        </nav>
        <div class="refresh-group">
          <button id="foldersRefreshBtn" class="menu-chip nav-refresh" title="Odśwież widok folderów">
            <span class="menu-chip__inner">R</span>
          </button>
          <button id="appRefreshBtn" class="menu-chip nav-refresh nav-refresh--wide" title="Odśwież aplikację">
            <span class="menu-chip__inner">REFRESH</span>
          </button>
        </div>
      </div>

      <div class="menu-strip header-controls">
        <div class="menu-select">
          <select id="containerSelect" title="Wybierz kontener (widok FOLDERS)">
            <option value="__all__">wszystkie kontenery</option>
          </select>
        </div>
        <div class="menu-select">
          <select id="folderSelect" title="Wybierz folder (widok FOLDERS)">
            <option value="__all__">wszystkie</option>
          </select>
        </div>
        <button id="filterClearBtn" class="filter-clear-chip" aria-label="Wyczyść filtry">
          <span class="filter-clear-chip__inner">X</span>
        </button>
      </div>
    </header>

    <div id="filter-panel"></div>

    <main>
      <div class="albums-container" id="albumsContainer"></div>
      <div class="pagination-shell">
        <div class="pagination cdp" data-actpage="1" aria-label="Nawigacja po stronach">
          <span id="pageInfo" class="pagination__sr-info">Strona 0 z 0</span>
        </div>
      </div>
    </main>

    <div class="status-area">
      <div id="progressContainer" class="progress-shell hidden">
        <div class="progress-bar">
          <div class="progress-fill"></div>
        </div>
        <div class="progress-label" id="progressLabel"></div>
      </div>
      <div id="fileStatus" class="progress-shell status-shell hidden"></div>
    </div>
    </div>
  </body>
</html>
